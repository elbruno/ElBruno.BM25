name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore src/ElBruno.BM25/ElBruno.BM25.csproj
      - name: Build
        run: dotnet build src/ElBruno.BM25/ElBruno.BM25.csproj --configuration Release --no-restore
      - name: Create NuGet package
        run: dotnet pack src/ElBruno.BM25/ElBruno.BM25.csproj --configuration Release --output nupkg
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push nupkg/ElBruno.BM25.*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
