name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x']
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Restore dependencies
        run: dotnet restore src/ElBruno.BM25/ElBruno.BM25.csproj
      - name: Build
        run: dotnet build src/ElBruno.BM25/ElBruno.BM25.csproj --configuration Release --no-restore
      - name: Restore test dependencies
        run: dotnet restore tests/ElBruno.BM25.Tests/ElBruno.BM25.Tests.csproj
      - name: Build tests
        run: dotnet build tests/ElBruno.BM25.Tests/ElBruno.BM25.Tests.csproj --configuration Release --no-restore
      - name: Run tests
        run: dotnet test tests/ElBruno.BM25.Tests/ElBruno.BM25.Tests.csproj --configuration Release --no-build --verbosity normal
